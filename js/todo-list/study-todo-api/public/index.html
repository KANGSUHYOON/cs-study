<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Study Dashboard</title>
    <link rel="stylesheet" href="./style.css" />
  </head>

  <body>
    <main class="app-shell">
      <section
        id="weatherHero"
        class="weather-hero"
        data-time="night"
        aria-labelledby="timeGreeting"
      >
        <div class="scene-layer sky-layer" aria-hidden="true"></div>

        <div class="scene-layer stars-layer" aria-hidden="true">
          <span class="star"></span>
          <span class="star"></span>
          <span class="star"></span>
          <span class="star"></span>
          <span class="star"></span>
          <span class="star"></span>
          <span class="star"></span>
          <span class="star"></span>
          <span class="star"></span>
          <span class="star"></span>
          <span class="star"></span>
          <span class="star"></span>
        </div>

        <div class="scene-layer sun-layer" aria-hidden="true">
          <span class="sun"></span>
        </div>

        <div class="scene-layer moon-layer" aria-hidden="true">
          <span class="moon"></span>
        </div>

        <div class="scene-layer clouds-layer" aria-hidden="true">
          <span class="cloud cloud-one"></span>
          <span class="cloud cloud-two"></span>
          <span class="cloud cloud-three"></span>
        </div>

        <div class="scene-layer landscape-layer" aria-hidden="true">
          <span class="ridge ridge-back"></span>
          <span class="ridge ridge-front"></span>
          <span class="water"></span>
          <span class="shore"></span>
        </div>

        <div class="weather-hero-content">
          <p id="koreanDate" class="korean-date"></p>
          <h1 id="timeGreeting" class="time-greeting"></h1>
          <p id="koreanTime" class="korean-time"></p>
        </div>

        <section class="todo-panel" aria-labelledby="todoHeading">
        <div class="todo-heading-row">
          <div>
            <p class="todo-eyebrow">STUDY PLAN</p>
            <h2 id="todoHeading">일정</h2>
          </div>
          <div class="todo-heading-actions">
            <button
              id="calendarToggle"
              class="calendar-toggle"
              type="button"
              aria-controls="calendarDrawer"
              aria-expanded="false"
              aria-label="캘린더 열기"
            >
              <span class="calendar-toggle-icon" aria-hidden="true"></span>
              <span>캘린더</span>
            </button>
            <div class="progress-area">
              <p id="progress" aria-live="polite">진행률: 0%</p>
              <div
                class="progress-track"
                role="progressbar"
                aria-label="Todo 완료 진행률"
                aria-valuemin="0"
                aria-valuemax="100"
                aria-valuenow="0"
              >
                <div id="progressBar" class="progress-bar"></div>
              </div>
            </div>
          </div>
        </div>

        <div class="add-box">
          <label class="sr-only" for="newTask">새로운 할 일</label>
          <input
            type="text"
            id="newTask"
            placeholder="할 일을 입력하세요"
            autocomplete="off"
          />
          <input type="date" id="todoDate" aria-label="일정 날짜" />
          <button id="addBtn" type="button">추가</button>
        </div>

        <div class="todo-filters" role="group" aria-label="Todo 필터">
          <button
            type="button"
            class="filter-btn active"
            data-filter="all"
            aria-pressed="true"
          >
            전체
            <span class="filter-count" id="allCount">0</span>
          </button>
          <button
            type="button"
            class="filter-btn"
            data-filter="active"
            aria-pressed="false"
          >
            진행 중
            <span class="filter-count" id="activeCount">0</span>
          </button>
          <button
            type="button"
            class="filter-btn"
            data-filter="completed"
            aria-pressed="false"
          >
            완료
            <span class="filter-count" id="completedCount">0</span>
          </button>
        </div>

        <div class="todo-box" id="todoList" aria-live="polite">
          <!-- 서버에서 가져온 Todo 목록이 여기에 생성됨 -->
        </div>
        </section>
      </section>
    </main>

    <div id="calendarOverlay" class="calendar-overlay" hidden></div>
    <aside
      id="calendarDrawer"
      class="calendar-drawer"
      aria-labelledby="calendarDrawerTitle"
      aria-hidden="true"
      inert
    >
      <div class="calendar-drawer-header">
        <div>
          <p class="calendar-eyebrow">MONTHLY PLAN</p>
          <h2 id="calendarDrawerTitle">월간 캘린더</h2>
        </div>
        <button
          id="calendarClose"
          class="calendar-close"
          type="button"
          aria-label="캘린더 닫기"
        >
          <span aria-hidden="true">×</span>
        </button>
      </div>

      <div class="calendar-month-nav">
        <button id="calendarPrev" type="button" aria-label="이전 달">
          <span aria-hidden="true">‹</span>
        </button>
        <h3 id="calendarMonthLabel" aria-live="polite"></h3>
        <button id="calendarNext" type="button" aria-label="다음 달">
          <span aria-hidden="true">›</span>
        </button>
      </div>

      <div
        id="calendarGrid"
        class="calendar-grid"
        aria-label="월간 일정"
        aria-busy="false"
      ></div>

      <section
        id="calendarDayDetail"
        class="calendar-day-detail"
        aria-live="polite"
        aria-busy="false"
      ></section>
    </aside>

    <script src="./script.js" defer></script>
  </body>
</html>
